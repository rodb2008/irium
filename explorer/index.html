<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="irium-node" content="https://node.iriumlabs.org">
<title>Irium Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
  header nav a { color: #8b949e; font-size: 14px; margin-left: 16px; }
  header nav a:hover { color: #e6edf3; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
  .stat-card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: #58a6ff; font-variant-numeric: tabular-nums; }
  .section { margin-bottom: 32px; }
  .section h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #f0f6fc; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; color: #8b949e; font-weight: 500; border-bottom: 1px solid #30363d; }
  td { padding: 8px 12px; border-bottom: 1px solid #21262d; vertical-align: middle; }
  tr:hover td { background: #161b22; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-funded { background: #1d4ed8; color: #93c5fd; }
  .badge-released { background: #14532d; color: #86efac; }
  .badge-refunded { background: #78350f; color: #fcd34d; }
  .badge-draft { background: #374151; color: #9ca3af; }
  .badge-expired { background: #7f1d1d; color: #fca5a5; }
  .badge-other { background: #374151; color: #9ca3af; }
  code { font-family: monospace; font-size: 12px; color: #79c0ff; }
  .loading { color: #8b949e; font-size: 14px; padding: 24px 0; }
  .error { color: #f85149; font-size: 14px; padding: 12px; background: #2d0e0e; border-radius: 6px; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 24px; }
  .search-bar input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
  .search-bar button { background: #238636; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .search-bar button:hover { background: #2ea043; }
  .pagination { display: flex; gap: 8px; margin-top: 16px; justify-content: center; }
  .pagination button { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pagination button:not(:disabled):hover { background: #30363d; }
</style>
</head>
<body>
<header>
  <h1>Irium Explorer</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="agreement.html">Agreements</a>
    <a href="reputation.html">Reputation</a>
  </nav>
</header>
<div class="container">
  <div class="search-bar">
    <input id="search-input" type="text" placeholder="Agreement hash or pubkey / address…">
    <button onclick="handleSearch()">Search</button>
  </div>

  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="label">Block Height</div><div class="value" id="stat-height">…</div></div>
    <div class="stat-card"><div class="label">Agreements</div><div class="value" id="stat-agreements">…</div></div>
    <div class="stat-card"><div class="label">Proofs</div><div class="value" id="stat-proofs">…</div></div>
    <div class="stat-card"><div class="label">Peers</div><div class="value" id="stat-peers">…</div></div>
  </div>

  <div class="section">
    <h2>Recent Agreements</h2>
    <div id="agreements-body"><div class="loading">Loading…</div></div>
    <div class="pagination">
      <button id="prev-btn" onclick="changePage(-1)" disabled>← Prev</button>
      <span id="page-info" style="padding:6px 12px;font-size:13px;color:#8b949e;"></span>
      <button id="next-btn" onclick="changePage(1)">Next →</button>
    </div>
  </div>

  <div class="section">
    <h2>Recent Proofs</h2>
    <div id="proofs-body"><div class="loading">Loading…</div></div>
  </div>
</div>

<script src="app.js"></script>
<script>
  const fmt = IriumExplorer.fmt;
  let currentPage = 1;
  const PAGE_SIZE = 20;

  function stateBadge(state) {
    const cls = {
      funded: 'badge-funded', released: 'badge-released', refunded: 'badge-refunded',
      draft: 'badge-draft', expired: 'badge-expired', cancelled: 'badge-expired',
    }[state] || 'badge-other';
    return `<span class="badge ${cls}">${fmt.capitalize(state)}</span>`;
  }

  async function loadStats() {
    try {
      const d = await IriumExplorer.api.stats();
      document.getElementById('stat-height').textContent = d.chain_height.toLocaleString();
      document.getElementById('stat-agreements').textContent = d.total_agreements.toLocaleString();
      document.getElementById('stat-proofs').textContent = d.total_proofs.toLocaleString();
      document.getElementById('stat-peers').textContent = d.peer_count;
    } catch (e) {
      document.getElementById('stats-grid').innerHTML = `<div class="error">Could not load stats: ${e.message}</div>`;
    }
  }

  async function loadAgreements() {
    document.getElementById('agreements-body').innerHTML = '<div class="loading">Loading…</div>';
    try {
      const d = await IriumExplorer.api.agreements(currentPage, PAGE_SIZE);
      if (!d.agreements || d.agreements.length === 0) {
        document.getElementById('agreements-body').innerHTML = '<p style="color:#8b949e;padding:12px 0;">No agreements found.</p>';
        return;
      }
      const rows = d.agreements.map(a => {
        const buyer = a.parties.find(p => p.role === 'buyer');
        const seller = a.parties.find(p => p.role === 'seller' || p.role === 'payee');
        return `<tr>
          <td><a href="agreement.html?hash=${a.hash}" title="${a.hash}"><code>${fmt.shortHash(a.hash)}</code></a></td>
          <td>${fmt.capitalize(a.template_type)}</td>
          <td style="color:#e6edf3;">${fmt.irm(a.total_amount)}</td>
          <td><code title="${buyer ? buyer.address : ''}">${buyer ? fmt.shortHash(buyer.address) : '—'}</code></td>
          <td><code title="${seller ? seller.address : ''}">${seller ? fmt.shortHash(seller.address) : '—'}</code></td>
          <td style="color:#8b949e;">${fmt.ts(a.creation_time)}</td>
        </tr>`;
      }).join('');
      document.getElementById('agreements-body').innerHTML =
        `<table><thead><tr><th>Hash</th><th>Type</th><th>Amount</th><th>Buyer</th><th>Seller</th><th>Created</th></tr></thead><tbody>${rows}</tbody></table>`;
      const totalPages = Math.ceil(d.total / PAGE_SIZE);
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages} (${d.total} total)`;
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      document.getElementById('next-btn').disabled = currentPage >= totalPages;
    } catch (e) {
      document.getElementById('agreements-body').innerHTML = `<div class="error">Error: ${e.message}</div>`;
    }
  }

  async function loadProofs() {
    try {
      const d = await IriumExplorer.api.proofs(1, 10);
      if (!d.proofs || d.proofs.length === 0) {
        document.getElementById('proofs-body').innerHTML = '<p style="color:#8b949e;padding:12px 0;">No proofs found.</p>';
        return;
      }
      const rows = d.proofs.map(p => `<tr>
        <td><code>${p.proof_type}</code></td>
        <td><a href="agreement.html?hash=${p.agreement_hash}" title="${p.agreement_hash}"><code>${fmt.shortHash(p.agreement_hash)}</code></a></td>
        <td><code title="${p.attested_by}">${fmt.shortHash(p.attested_by)}</code></td>
        <td>${stateBadge(p.status)}</td>
        <td style="color:#8b949e;">${fmt.ts(p.attestation_time)}</td>
      </tr>`).join('');
      document.getElementById('proofs-body').innerHTML =
        `<table><thead><tr><th>Type</th><th>Agreement</th><th>Attested By</th><th>Status</th><th>Time</th></tr></thead><tbody>${rows}</tbody></table>`;
    } catch (e) {
      document.getElementById('proofs-body').innerHTML = `<div class="error">Error: ${e.message}</div>`;
    }
  }

  function changePage(delta) {
    currentPage += delta;
    if (currentPage < 1) currentPage = 1;
    loadAgreements();
  }

  function handleSearch() {
    const val = document.getElementById('search-input').value.trim();
    if (!val) return;
    if (val.length === 64 && /^[0-9a-fA-F]+$/.test(val)) {
      location.href = `agreement.html?hash=${val}`;
    } else {
      location.href = `reputation.html?pubkey=${encodeURIComponent(val)}`;
    }
  }

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSearch();
  });

  loadStats();
  loadAgreements();
  loadProofs();
</script>
</body>
</html>
