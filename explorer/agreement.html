<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="irium-node" content="https://node.iriumlabs.org">
<title>Agreement — Irium Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
  header nav a { color: #8b949e; font-size: 14px; margin-left: 16px; }
  .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .card h2 { font-size: 15px; font-weight: 600; color: #f0f6fc; margin-bottom: 16px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
  .kv-grid { display: grid; grid-template-columns: 160px 1fr; gap: 8px 16px; font-size: 13px; }
  .kv-grid .key { color: #8b949e; }
  .kv-grid .val { color: #e6edf3; word-break: break-all; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge-funded { background: #1d4ed8; color: #93c5fd; }
  .badge-released { background: #14532d; color: #86efac; }
  .badge-refunded { background: #78350f; color: #fcd34d; }
  .badge-draft,.badge-proposed { background: #374151; color: #9ca3af; }
  .badge-expired,.badge-cancelled { background: #7f1d1d; color: #fca5a5; }
  .badge-other { background: #374151; color: #9ca3af; }
  code { font-family: monospace; font-size: 12px; color: #79c0ff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; color: #8b949e; font-weight: 500; border-bottom: 1px solid #30363d; }
  td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
  .loading { color: #8b949e; font-size: 14px; padding: 24px 0; }
  .error { color: #f85149; font-size: 14px; padding: 12px; background: #2d0e0e; border-radius: 6px; }
  .lifecycle-bar { display: flex; gap: 4px; margin: 12px 0; }
  .lifecycle-step { flex: 1; height: 6px; border-radius: 3px; background: #21262d; }
  .lifecycle-step.done { background: #238636; }
  .lifecycle-step.active { background: #1d4ed8; }
  .lifecycle-step.failed { background: #b91c1c; }
</style>
</head>
<body>
<header>
  <h1><a href="index.html" style="color:inherit;">Irium Explorer</a></h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="agreement.html">Agreements</a>
    <a href="reputation.html">Reputation</a>
  </nav>
</header>
<div class="container">
  <div id="content"><div class="loading">Loading agreement…</div></div>
</div>
<script src="app.js"></script>
<script>
  const fmt = IriumExplorer.fmt;
  const params = new URLSearchParams(location.search);
  const hash = params.get('hash');

  function stateBadge(state) {
    const cls = {
      funded: 'badge-funded', released: 'badge-released', refunded: 'badge-refunded',
      draft: 'badge-draft', proposed: 'badge-proposed',
      expired: 'badge-expired', cancelled: 'badge-cancelled',
    }[state] || 'badge-other';
    return `<span class="badge ${cls}">${fmt.capitalize(state)}</span>`;
  }

  function lifecycleBar(state) {
    const steps = ['draft', 'funded', 'released'];
    const idx = steps.indexOf(state);
    return steps.map((s, i) => {
      const cls = i < idx ? 'done' : (i === idx ? 'active' : '');
      return `<div class="lifecycle-step ${cls}" title="${fmt.capitalize(s)}"></div>`;
    }).join('');
  }

  async function load() {
    if (!hash) {
      document.getElementById('content').innerHTML = '<div class="error">No agreement hash specified. Use ?hash=... in the URL.</div>';
      return;
    }
    try {
      const d = await IriumExplorer.api.agreement(hash);
      if (d.error) { document.getElementById('content').innerHTML = `<div class="error">${d.error}</div>`; return; }
      const agr = d.agreement;
      const lc = d.lifecycle;
      const parties = (agr.parties || []).map(p =>
        `<tr><td>${fmt.capitalize(p.role)}</td><td>${p.display_name || '—'}</td><td><code><a href="reputation.html?pubkey=${p.address}">${p.address}</a></code></td></tr>`
      ).join('');
      const proofRows = (d.proofs || []).map(p =>
        `<tr><td><code>${p.proof_type}</code></td><td><code title="${p.attested_by}">${fmt.shortHash(p.attested_by)}</code></td><td>${stateBadge(p.status)}</td><td style="color:#8b949e;">${fmt.ts(p.attestation_time)}</td></tr>`
      ).join('');

      document.getElementById('content').innerHTML = `
        <div class="card">
          <h2>Agreement ${stateBadge(lc && lc.state ? lc.state : 'unknown')}</h2>
          <div class="lifecycle-bar">${lifecycleBar(lc ? lc.state : '')}</div>
          <div class="kv-grid">
            <span class="key">Hash</span><span class="val"><code>${hash}</code></span>
            <span class="key">Agreement ID</span><span class="val">${agr.agreement_id || '—'}</span>
            <span class="key">Type</span><span class="val">${fmt.capitalize(agr.template_type)}</span>
            <span class="key">Total Amount</span><span class="val">${fmt.irm(agr.total_amount)}</span>
            <span class="key">Created</span><span class="val">${fmt.ts(agr.creation_time)}</span>
            ${lc ? `<span class="key">Funded</span><span class="val">${fmt.irm(lc.funded_amount)}</span>
            <span class="key">Released</span><span class="val">${fmt.irm(lc.released_amount)}</span>
            <span class="key">Refunded</span><span class="val">${fmt.irm(lc.refunded_amount)}</span>` : ''}
          </div>
        </div>
        <div class="card">
          <h2>Parties</h2>
          <table><thead><tr><th>Role</th><th>Name</th><th>Address</th></tr></thead><tbody>${parties || '<tr><td colspan="3" style="color:#8b949e;">No parties</td></tr>'}</tbody></table>
        </div>
        ${d.proofs && d.proofs.length > 0 ? `<div class="card">
          <h2>Proofs (${d.proofs.length})</h2>
          <table><thead><tr><th>Type</th><th>Attested By</th><th>Status</th><th>Time</th></tr></thead><tbody>${proofRows}</tbody></table>
        </div>` : ''}
      `;
      document.title = `${hash.slice(0, 12)}… — Irium Explorer`;
    } catch (e) {
      document.getElementById('content').innerHTML = `<div class="error">Failed to load agreement: ${e.message}</div>`;
    }
  }
  load();
</script>
</body>
</html>
