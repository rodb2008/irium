# Irium node + miner — docker-compose setup.
# Copy .env.example to .env and fill in your values before running.
# Start with: docker-compose up -d

services:
  iriumd:
    image: ghcr.io/iriumlabs/irium:latest
    build:
      context: .
      dockerfile: Dockerfile.iriumd
    volumes:
      - irium_data:/home/irium/.irium
    ports:
      - "${IRIUM_P2P_EXTERNAL_PORT:-38291}:38291"
      - "${IRIUM_RPC_EXTERNAL_PORT:-38300}:38300"
      - "${IRIUM_STATUS_EXTERNAL_PORT:-8080}:8080"
    environment:
      IRIUM_DATA_DIR: /home/irium/.irium
      IRIUM_P2P_BIND: "0.0.0.0:38291"
      IRIUM_NODE_HOST: "0.0.0.0"
      IRIUM_NODE_PORT: "38300"
      IRIUM_STATUS_HOST: "0.0.0.0"
      IRIUM_STATUS_PORT: "8080"
      IRIUM_NODE_PUBLIC_IP: "${IRIUM_NODE_PUBLIC_IP:-}"
      IRIUM_RPC_TOKEN: "${IRIUM_RPC_TOKEN:-}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:38300/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  irium-miner:
    image: ghcr.io/iriumlabs/irium-miner:latest
    build:
      context: .
      dockerfile: Dockerfile.irium-miner
    depends_on:
      iriumd:
        condition: service_healthy
    environment:
      IRIUM_MINER_ADDRESS: "${IRIUM_MINER_ADDRESS}"
      IRIUM_NODE_RPC: "http://iriumd:38300"
      IRIUM_MINER_THREADS: "${IRIUM_MINER_THREADS:-2}"
      IRIUM_RPC_TOKEN: "${IRIUM_RPC_TOKEN:-}"
    restart: unless-stopped

volumes:
  irium_data:
