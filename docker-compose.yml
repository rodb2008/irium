version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: irium_explorer
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: irium_explorer
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irium_explorer"]
      interval: 5s
      timeout: 5s
      retries: 10

  indexer:
    build:
      context: ./explorer
      dockerfile: ../docker/Dockerfile.indexer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://irium_explorer:${DB_PASSWORD:-changeme}@db:5432/irium_explorer
      IRIUMD_RPC_URL: ${IRIUMD_RPC_URL:-http://host.docker.internal:38300}
      INDEXER_BATCH_SIZE: ${INDEXER_BATCH_SIZE:-500}
      INDEXER_POLL_MS: ${INDEXER_POLL_MS:-2000}
      RUST_LOG: irium_explorer_indexer=info
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api:
    build:
      context: ./explorer
      dockerfile: ../docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3400:3400"
    environment:
      DATABASE_URL: postgres://irium_explorer:${DB_PASSWORD:-changeme}@db:5432/irium_explorer
      API_HOST: 0.0.0.0
      API_PORT: "3400"
      API_RATE_LIMIT_RPS: ${API_RATE_LIMIT_RPS:-60}
      RUST_LOG: irium_explorer_api=info

  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3401:80"
    depends_on:
      - api

volumes:
  db_data:
