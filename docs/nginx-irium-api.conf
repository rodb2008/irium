server {
    server_name _;

    # Static files
    location /irium-logo-wallet.svg {
        root /var/www/html;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Rewrite /api/ to /api (remove trailing slash)
    rewrite ^/api/$ /api permanent;

    # Explorer API base - return JSON
    location = /api {
        default_type application/json;
        return 200 '{"message":"Irium Explorer API v1.2.0","endpoints":["/api/stats","/api/blocks?limit=N","/api/block/{height}"],"documentation":"self-hosted"}';
        add_header Access-Control-Allow-Origin * always;
    }

    # Explorer API endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
    }

    # Wallet API redirect
    location = /wallet {
        return 301 /wallet/;
    }

    # Wallet API endpoints
    location /wallet/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
    }

    # API root
    location = / {
        default_type application/json;
        return 200 '{"name":"Irium API","version":"v1.2.0","network":"irium-mainnet","endpoints":{"explorer":"/api","wallet":"/wallet/"},"documentation":"self-hosted"}';
        add_header Access-Control-Allow-Origin * always;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/irium/tls/irium.crt;
    ssl_certificate_key /etc/irium/tls/irium.key;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}
