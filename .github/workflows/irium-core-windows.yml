name: Build Irium Core Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install tauri-cli
        run: cargo install tauri-cli --version 1.5.12

      - name: Build NSIS bundle
        run: cargo tauri build --bundles nsis
        working-directory: apps/irium-core-gui/src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Irium_Core_v0.1_Alpha_windows_nsis
          path: |
            apps/irium-core-gui/src-tauri/target/release/bundle/nsis/*.exe
            apps/irium-core-gui/src-tauri/target/release/bundle/nsis/*.zip
