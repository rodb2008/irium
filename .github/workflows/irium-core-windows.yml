name: Build Irium Core Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install tauri-cli (prebuilt)
        shell: pwsh
        run: |
          $ProgressPreference = SilentlyContinue
          $uri = https://github.com/tauri-apps/tauri/releases/download/tauri-cli-v1.5.12/cargo-tauri-x86_64-pc-windows-msvc.zip
          $zip = "$env:RUNNER_TEMP\cargo-tauri.zip"
          Invoke-WebRequest -Uri $uri -OutFile $zip
          $dest = "$env:RUNNER_TEMP\cargo-tauri"
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Expand-Archive -Path $zip -DestinationPath $dest
          $bin = "$env:USERPROFILE\.cargo\bin"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          Move-Item -Force "$dest\cargo-tauri.exe" "$bin\cargo-tauri.exe"

      - name: Build NSIS bundle
        run: cargo tauri build --bundles nsis
        working-directory: apps/irium-core-gui/src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Irium_Core_v0.1_Alpha_windows_nsis
          path: |
            apps/irium-core-gui/src-tauri/target/release/bundle/nsis/*.exe
            apps/irium-core-gui/src-tauri/target/release/bundle/nsis/*.zip
