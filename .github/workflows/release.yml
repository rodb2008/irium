name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            use_cross: "false"
            build_gpu: "true"

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            use_cross: "true"
            build_gpu: "false"

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            use_cross: "false"
            build_gpu: "true"

          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            use_cross: "false"
            build_gpu: "false"

          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            use_cross: "false"
            build_gpu: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install OpenCL headers (Linux)
        if: matrix.build_gpu == 'true' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev

      - name: Build core binaries
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} \
              --bin iriumd --bin irium-wallet --bin irium-miner --bin irium-spv
          else
            cargo build --release --target ${{ matrix.target }} \
              --bin iriumd --bin irium-wallet --bin irium-miner --bin irium-spv
          fi

      - name: Generate OpenCL.lib (Windows)
        if: matrix.os == 'windows-latest' && matrix.build_gpu == 'true'
        shell: pwsh
        run: |
          $vsRoot = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $msvcDir = Get-ChildItem "$vsRoot\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $msvcDir) { throw "No MSVC toolchain under $vsRoot" }
          $msvcBin = "$($msvcDir.FullName)\bin\HostX64\x64"
          $stubRoot = Join-Path $env:RUNNER_TEMP 'opencl-stub'
          $libDir = Join-Path $stubRoot 'lib\x64'
          New-Item -ItemType Directory -Path $libDir -Force | Out-Null
          Push-Location $env:RUNNER_TEMP
          & "$msvcBin\dumpbin.exe" /exports C:\Windows\System32\OpenCL.dll | Out-File -Encoding ASCII opencl-exports.txt
          $def = New-Object System.Collections.Generic.List[string]
          $def.Add('LIBRARY OpenCL')
          $def.Add('EXPORTS')
          $inSec = $false
          foreach ($l in Get-Content opencl-exports.txt) {
            if ($l -match '^\s+ordinal\s+hint') { $inSec = $true; continue }
            if ($inSec) {
              if ($l -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)') { $def.Add('    ' + $matches[1]) }
              elseif ($l -match '^\s+Summary') { break }
            }
          }
          $def | Out-File -Encoding ASCII OpenCL.def
          & "$msvcBin\lib.exe" /def:OpenCL.def /out:"$libDir\OpenCL.lib" /machine:x64
          Pop-Location
          if (-not (Test-Path "$libDir\OpenCL.lib")) { throw 'OpenCL.lib generation failed' }
          Write-Host "Generated OpenCL.lib ($((Get-Item "$libDir\OpenCL.lib").Length) bytes)"
          "INTELOCLSDKROOT=$stubRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build GPU miner
        if: matrix.build_gpu == 'true'
        run: |
          cargo build --release --target ${{ matrix.target }} --features gpu --bin irium-miner-gpu

      - name: Package archive (Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          case "${TARGET}" in
            x86_64-unknown-linux-gnu)   PLATFORM="linux-x86_64"   ;;
            aarch64-unknown-linux-gnu)  PLATFORM="linux-arm64"    ;;
            x86_64-apple-darwin)        PLATFORM="macos-x86_64"   ;;
            aarch64-apple-darwin)       PLATFORM="macos-arm64"    ;;
            *)                          PLATFORM="${TARGET}"       ;;
          esac
          ARCHIVE="irium-${VERSION}-${PLATFORM}.tar.gz"
          STAGING="dist-${TARGET}"
          mkdir -p "${STAGING}"
          for bin in iriumd irium-wallet irium-miner irium-spv; do
            cp "target/${TARGET}/release/${bin}" "${STAGING}/"
          done
          if [ "${{ matrix.build_gpu }}" = "true" ]; then
            if [ -f "target/${TARGET}/release/irium-miner-gpu" ]; then
              cp "target/${TARGET}/release/irium-miner-gpu" "${STAGING}/"
              echo "Included irium-miner-gpu in archive"
            else
              echo "ERROR: build_gpu=true but irium-miner-gpu missing"
              exit 1
            fi
          fi
          for helper in mine-gpu.sh mine-cpu.sh mine-gpu-mac.sh mine-cpu-mac.sh mine-gpu.bat mine-cpu.bat; do
            if [ -f "${helper}" ]; then
              cp "${helper}" "${STAGING}/"
              chmod +x "${STAGING}/${helper}" 2>/dev/null || true
            fi
          done
          # MINING-QUICKSTART.txt lives at the repo root so the
          # template stays out of the YAML scalar (heredocs whose body
          # touches column 0 break the YAML block scalar parser).
          if [ -f MINING-QUICKSTART.txt ]; then
            cp MINING-QUICKSTART.txt "${STAGING}/"
          fi
          tar -czf "${ARCHIVE}" -C "${STAGING}" .
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Package archive (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $target = "${{ matrix.target }}"
          $platform = switch ($target) {
            "x86_64-pc-windows-msvc" { "windows-x86_64" }
            default { $target }
          }
          $archive = "irium-${version}-${platform}.zip"
          $staging = "dist-${target}"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          foreach ($bin in @("iriumd", "irium-wallet", "irium-miner", "irium-spv")) {
            Copy-Item "target/${target}/release/${bin}.exe" "${staging}/"
          }
          if ("${{ matrix.build_gpu }}" -eq "true") {
            $gpu = "target/${target}/release/irium-miner-gpu.exe"
            if (Test-Path $gpu) {
              Copy-Item $gpu "${staging}/"
              Write-Host "Included irium-miner-gpu.exe in archive"
            } else {
              throw "build_gpu=true but irium-miner-gpu.exe missing at $gpu"
            }
          }
          foreach ($helper in @("mine-gpu.bat", "mine-cpu.bat", "mine-gpu.sh", "mine-cpu.sh", "mine-gpu-mac.sh", "mine-cpu-mac.sh")) {
            if (Test-Path $helper) { Copy-Item $helper "${staging}/" }
          }
          if (Test-Path "MINING-QUICKSTART.txt") {
            Copy-Item "MINING-QUICKSTART.txt" "${staging}/"
          }
          Compress-Archive -Path "${staging}/*" -DestinationPath $archive -Force
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true
          path: dist

      - name: Generate SHA256 checksums
        working-directory: dist
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: dist/**
          fail_on_unmatched_files: true
          generate_release_notes: false
          update_only_unreleased: false
          body: |
            ## Irium ${{ github.ref_name }}

            See [CHANGELOG.md](https://github.com/iriumlabs/irium/blob/main/CHANGELOG.md) for the full list of changes.

            ### Download

            | Platform | Archive |
            |----------|---------|
            | Linux 64-bit (x86_64) | `irium-${{ github.ref_name }}-linux-x86_64.tar.gz` |
            | Linux ARM64 | `irium-${{ github.ref_name }}-linux-arm64.tar.gz` |
            | Windows 64-bit | `irium-${{ github.ref_name }}-windows-x86_64.zip` |
            | macOS Intel | `irium-${{ github.ref_name }}-macos-x86_64.tar.gz` |
            | macOS Apple Silicon | `irium-${{ github.ref_name }}-macos-arm64.tar.gz` |

            ### Verify your download

            ```sh
            sha256sum -c checksums.txt 2>&1 | grep OK
            ```

            ### Quick install

            ```sh
            curl -sSL https://raw.githubusercontent.com/iriumlabs/irium/main/install.sh | bash
            ```

  docker:
    name: Publish Docker images
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push iriumd image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.iriumd
          push: true
          tags: |
            ghcr.io/iriumlabs/irium:latest
            ghcr.io/iriumlabs/irium:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push irium-miner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.irium-miner
          push: true
          tags: |
            ghcr.io/iriumlabs/irium-miner:latest
            ghcr.io/iriumlabs/irium-miner:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
