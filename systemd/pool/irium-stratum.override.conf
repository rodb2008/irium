[Unit]
After=network-online.target iriumd.service irium-pool-shim.service
Wants=network-online.target iriumd.service irium-pool-shim.service
Requires=iriumd.service irium-pool-shim.service
StartLimitIntervalSec=120
StartLimitBurst=10

[Service]
EnvironmentFile=-/etc/irium/iriumd.env
Environment=IRIUM_TEMPLATE_MAX_AGE_SECONDS=60
Environment=IRIUM_TEMPLATE_MAX_CONSECUTIVE_FAILURES=20
Environment=IRIUM_STRATUM_COINBASE_BIP34=1
Restart=always
RestartSec=3
